<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACI — JK Learn</title>
  <style>
    :root { --bg:#fafaf8;--surface:#fff;--text:#1a1a1a;--text-muted:#555;--navy:#1a2744;--gold:#b8860b;--border:#d4d4d4; }
    [data-theme="dark"] { --bg:#0f1419;--surface:#1a2332;--text:#e8e6e3;--text-muted:#a0a0a0;--navy:#1e3a5f;--gold:#d4a017;--border:#2d3748; }
    * { box-sizing:border-box;margin:0;padding:0; }
    body { font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transition:background .3s,color .3s; }
    h1 { font-size:1.5rem;margin-bottom:.5rem; }
    p { color:var(--text-muted);max-width:400px;margin:0 auto .8rem; }
    a { color:var(--gold);text-decoration:none; }
    .tag { font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="tag">Coming Soon</div>
  <h1>Advanced Computing for AI</h1>
  <p>Lessons for ACI will appear here as they are created. Check back soon.</p>
  <a href="../../">Back to JK Learn</a>
  <script>
    const s=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    if(s==='dark')document.documentElement.setAttribute('data-theme','dark');
  </script>
</body>
</html>
